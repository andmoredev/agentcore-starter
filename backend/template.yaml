AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AgentCore Chatbot Backend - Serverless infrastructure for an AI assistant powered by Bedrock AgentCore

Parameters:
  ArtifactsBucketName:
    Type: String
    Description: S3 bucket name for deployment artifacts (used for direct code deployment)

  AgentDirectDeployKey:
    Type: String
    Description: S3 key for agent deployment ZIP file
    Default: "agents/agent.zip"

  AgentImageUri:
    Type: String
    Description: ECR image URI for agent Docker container

  EnvironmentHash:
    Type: String
    Description: A hash of the current environment

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Tracing: Active
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
      AllowOrigin: "'*'"
    TracingEnabled: true

Resources:
  BackendApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
        AllowOrigin: "'*'"
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: ./openapi.yaml

  AgentCoreInvokeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: agentcore-invoke.handler
      Description: Lambda function to invoke AgentCore Runtime
      Runtime: nodejs24.x
      Timeout: 600
      Environment:
        Variables:
          AGENT_RUNTIME_ARN: !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
                - bedrock-agentcore:InvokeAgentRuntimeForUser
              Resource: !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
                - logs:DescribeLogStreams
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - agentcore-invoke.js

  ApiGatewayStepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewayStepFunctionsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartSyncExecution
                Resource: !Ref AgentStateMachine

  AgentStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Type: EXPRESS
      DefinitionUri: workflows/query-processing.asl.json
      DefinitionSubstitutions:
        AgentCoreInvokeFunctionArn: !GetAtt AgentCoreInvokeFunction.Arn
      Tracing:
        Enabled: true
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt AgentCoreInvokeFunction.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
                - logs:DescribeLogStreams
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/stepfunctions/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"

  AgentCoreShortTermMemory:
    Type: AWS::BedrockAgentCore::Memory
    Properties:
      Name: !Sub AgentMemory${EnvironmentHash}
      Description: Short-term memory for agent conversation persistence
      MemoryExecutionRoleArn: !GetAtt AgentCoreRole.Arn
      EventExpiryDuration: 30

  AgentCoreRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    Properties:
      AgentRuntimeArtifact:
        CodeConfiguration:
          Code:
            S3:
              Bucket: !Ref ArtifactsBucketName
              Prefix: !Ref AgentDirectDeployKey
          EntryPoint:
            - agent.py
          Runtime: PYTHON_3_13
      AgentRuntimeName: !Sub Agent${EnvironmentHash}
      NetworkConfiguration:
        NetworkMode: PUBLIC
      RoleArn: !GetAtt AgentCoreRole.Arn
      EnvironmentVariables:
        AGENTCORE_MEMORY_ID: !GetAtt AgentCoreShortTermMemory.MemoryId

  AgentCoreRuntimeContainer:
    Type: AWS::BedrockAgentCore::Runtime
    Properties:
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Ref AgentImageUri
      AgentRuntimeName: !Sub AgentContainer${EnvironmentHash}
      NetworkConfiguration:
        NetworkMode: PUBLIC
      RoleArn: !GetAtt AgentCoreRole.Arn
      EnvironmentVariables:
        AGENTCORE_MEMORY_ID: !GetAtt AgentCoreShortTermMemory.MemoryId

  AgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId
      Policies:
        - PolicyName: AgentCorePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECRImageAccess
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource:
                  - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/*"
              - Sid: S3DirectDeployAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactsBucketName}/*"
              - Effect: Allow
                Action:
                  - logs:DescribeLogStreams
                  - logs:CreateLogGroup
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*"
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*:log-stream:*"
              - Sid: ECRTokenAccess
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"
              - Effect: Allow
                Resource: "*"
                Action: cloudwatch:PutMetricData
                Condition:
                  StringEquals:
                    "cloudwatch:namespace": bedrock-agentcore
              - Sid: BedrockAgentCoreRuntime
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
              - Sid: BedrockAgentCoreMemoryCreateMemory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateMemory
                Resource: "*"
              - Sid: BedrockAgentCoreMemory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:GetMemory
                  - bedrock-agentcore:GetMemoryRecord
                  - bedrock-agentcore:ListActors
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:ListMemoryRecords
                  - bedrock-agentcore:ListSessions
                  - bedrock-agentcore:DeleteEvent
                  - bedrock-agentcore:DeleteMemoryRecord
                  - bedrock-agentcore:RetrieveMemoryRecords
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/*"
              - Sid: BedrockAgentCoreIdentityGetResourceApiKey
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceApiKey
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/apikeycredentialprovider/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/agent-*"
              - Sid: BedrockAgentCoreIdentityGetResourceOauth2Token
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceOauth2Token
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/oauth2credentialprovider/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/agent-*"
              - Sid: BedrockAgentCoreIdentityGetWorkloadAccessToken
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetWorkloadAccessToken
                  - bedrock-agentcore:GetWorkloadAccessTokenForJWT
                  - bedrock-agentcore:GetWorkloadAccessTokenForUserId
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/agent-*"
              - Sid: BedrockModelInvocation
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ApplyGuardrail
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:*"

Outputs:
  BackendApiUrl:
    Description: "API Gateway endpoint URL for Backend API"
    Value: !Sub "https://${BackendApi}.execute-api.${AWS::Region}.amazonaws.com/api/"

  AgentCoreRuntimeId:
    Description: "AgentCore Runtime ID for the Agent"
    Value: !Ref AgentCoreRuntime

  AgentCoreRuntimeContainerId:
    Description: "AgentCore Runtime ID for the Agent (container deployment)"
    Value: !Ref AgentCoreRuntimeContainer

  AgentCoreMemoryId:
    Description: "AgentCore Short-Term Memory ID"
    Value: !GetAtt AgentCoreShortTermMemory.MemoryId

  AgentStateMachineArn:
    Description: "Step Functions State Machine ARN"
    Value: !Ref AgentStateMachine
